<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin — Ayesha Proposal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --black:#0b0b0d; --panel:#151417; --red:#e0264d; --pink:#ff6f9c;
    --white:#fff; --muted:#a9a4a8;
  }
  *{ box-sizing:border-box; }
  body{
    margin:0; font-family:'Poppins',sans-serif; background:var(--black); color:var(--white);
    min-height:100vh;
  }
  .login-wrap{
    min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;
  }
  .login-card{
    background:var(--panel); padding:36px 30px; border-radius:16px; width:100%; max-width:360px;
    border:1px solid rgba(255,255,255,0.08);
  }
  .login-card h1{ font-size:20px; margin:0 0 18px; text-align:center; }
  .login-card input{
    width:100%; padding:12px 14px; border-radius:10px; border:1px solid rgba(255,255,255,0.15);
    background:#1d1c20; color:var(--white); margin-bottom:12px; font-size:14px;
  }
  .login-card button{
    width:100%; padding:12px; border-radius:10px; border:none; background:linear-gradient(135deg,var(--red),var(--pink));
    color:#fff; font-weight:600; cursor:pointer;
  }
  .login-error{ color:var(--red); font-size:12.5px; min-height:18px; margin-bottom:8px; }

  #dashboard{ display:none; padding: 20px clamp(16px, 4vw, 48px) 60px; }
  .topbar{ display:flex; justify-content:space-between; align-items:center; margin-bottom:22px; flex-wrap:wrap; gap:10px; }
  .topbar h1{ font-size:20px; }
  .topbar button{
    background:#1d1c20; color:var(--white); border:1px solid rgba(255,255,255,0.15);
    padding:9px 16px; border-radius:8px; cursor:pointer; font-size:13px;
  }

  .stats{ display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:14px; margin-bottom:26px; }
  .stat-card{
    background:var(--panel); border-radius:12px; padding:16px; border:1px solid rgba(255,255,255,0.06);
  }
  .stat-card .num{ font-size:26px; font-weight:700; }
  .stat-card .label{ font-size:12px; color:var(--muted); margin-top:4px; }

  .toolbar{ display:flex; gap:10px; flex-wrap:wrap; margin-bottom:18px; }
  .toolbar input, .toolbar select{
    padding:9px 12px; border-radius:8px; border:1px solid rgba(255,255,255,0.15);
    background:#1d1c20; color:var(--white); font-size:13px;
  }
  .toolbar button{
    padding:9px 16px; border-radius:8px; border:none; background:linear-gradient(135deg,var(--red),var(--pink));
    color:#fff; font-weight:600; cursor:pointer; font-size:13px;
  }

  .visitor-list{ display:flex; flex-direction:column; gap:12px; }
  .visitor-card{
    background:var(--panel); border-radius:14px; padding:18px; border:1px solid rgba(255,255,255,0.06);
  }
  .visitor-head{ display:flex; justify-content:space-between; flex-wrap:wrap; gap:8px; margin-bottom:10px; }
  .visitor-head .tag{
    font-size:11px; padding:4px 10px; border-radius:999px; font-weight:600;
  }
  .tag.yes{ background:rgba(224,38,77,0.2); color:var(--pink); }
  .tag.no{ background:rgba(255,255,255,0.06); color:var(--muted); }
  .tag.pending{ background:rgba(255,255,255,0.08); color:var(--muted); }
  .visitor-meta{ font-size:12.5px; color:var(--muted); display:flex; gap:14px; flex-wrap:wrap; margin-bottom:10px; }
  .visitor-message{
    font-size:14px; background:#1d1c20; border-radius:10px; padding:12px 14px; margin-bottom:10px;
    line-height:1.5; white-space:pre-wrap;
  }
  .visitor-actions{ display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
  .visitor-actions a, .visitor-actions button{
    font-size:12.5px; padding:7px 12px; border-radius:8px; border:1px solid rgba(255,255,255,0.15);
    background:#1d1c20; color:var(--white); cursor:pointer; text-decoration:none;
  }
  .visitor-actions .delete-btn{ border-color: rgba(224,38,77,0.4); color:var(--pink); }
  .empty-state{ color:var(--muted); text-align:center; padding:40px 0; }
</style>
</head>
<body>

<div class="login-wrap" id="loginWrap">
  <div class="login-card">
    <h1>Admin Access</h1>
    <div class="login-error" id="loginError"></div>
    <input type="email" id="adminEmail" placeholder="Admin email" />
    <input type="password" id="adminPassword" placeholder="Password" />
    <button id="loginBtn">Log In</button>
  </div>
</div>

<div id="dashboard">
  <div class="topbar">
    <h1>Visitor Dashboard</h1>
    <button id="logoutBtn">Log Out</button>
  </div>

  <div class="stats">
    <div class="stat-card"><div class="num" id="statTotal">0</div><div class="label">Total Visitors</div></div>
    <div class="stat-card"><div class="num" id="statYes">0</div><div class="label">YES</div></div>
    <div class="stat-card"><div class="num" id="statNo">0</div><div class="label">Pending / No</div></div>
    <div class="stat-card"><div class="num" id="statAvgTime">0s</div><div class="label">Avg Time Spent</div></div>
  </div>

  <div class="toolbar">
    <input type="text" id="searchInput" placeholder="Search messages..." />
    <select id="filterSelect">
      <option value="all">All</option>
      <option value="yes">YES only</option>
      <option value="pending">Pending / No</option>
    </select>
    <button id="exportCsvBtn">Export CSV</button>
  </div>

  <div class="visitor-list" id="visitorList">
    <div class="empty-state">Loading visitors...</div>
  </div>
</div>

<script type="module" src="js/admin.js"></script>
</body>
</html>
